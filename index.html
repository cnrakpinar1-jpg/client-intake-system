<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Intake System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-icon">CI</div>
        <div>
          <h1>Client Intake System</h1>
          <p>Capture and organize incoming client inquiries</p>
        </div>
      </div>
      <div class="header-stats" id="headerStats">
        <div class="stat-pill">
          <span class="stat-number" id="statTotal">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-pill new">
          <span class="stat-number" id="statNew">0</span>
          <span class="stat-label">New</span>
        </div>
        <div class="stat-pill qualified">
          <span class="stat-number" id="statQualified">0</span>
          <span class="stat-label">Qualified</span>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">

    <!-- DASHBOARD SUMMARY -->
    <section class="dashboard" aria-label="Summary statistics">

      <div class="dash-card dash-total">
        <div class="dash-card-inner">
          <div class="dash-text">
            <span class="dash-number" id="dashTotal">0</span>
            <span class="dash-label">Total Inquiries</span>
          </div>
          <div class="dash-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          </div>
        </div>
      </div>

      <div class="dash-card dash-new">
        <div class="dash-card-inner">
          <div class="dash-text">
            <span class="dash-number" id="dashNew">0</span>
            <span class="dash-label">New</span>
          </div>
          <div class="dash-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </div>
        </div>
      </div>

      <div class="dash-card dash-contacted">
        <div class="dash-card-inner">
          <div class="dash-text">
            <span class="dash-number" id="dashContacted">0</span>
            <span class="dash-label">Contacted</span>
          </div>
          <div class="dash-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
        </div>
      </div>

      <div class="dash-card dash-qualified">
        <div class="dash-card-inner">
          <div class="dash-text">
            <span class="dash-number" id="dashQualified">0</span>
            <span class="dash-label">Qualified</span>
          </div>
          <div class="dash-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
      </div>

      <div class="dash-card dash-closed">
        <div class="dash-card-inner">
          <div class="dash-text">
            <span class="dash-number" id="dashClosed">0</span>
            <span class="dash-label">Closed</span>
          </div>
          <div class="dash-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
        </div>
      </div>

    </section>

    <!-- INTAKE FORM PANEL -->
    <section class="panel form-panel">
      <div class="panel-header">
        <h2>New Client Inquiry</h2>
        <button class="btn-toggle-form" id="toggleFormBtn" aria-expanded="true">
          <span>Hide Form</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
      </div>

      <div id="intakeForm" class="form-body">
        <form id="clientForm" novalidate>

          <div class="form-grid">
            <div class="form-group">
              <label for="fullName">Full Name <span class="required">*</span></label>
              <input type="text" id="fullName" placeholder="Jane Smith" required />
              <span class="field-error" id="err-fullName"></span>
            </div>

            <div class="form-group">
              <label for="company">Company Name</label>
              <input type="text" id="company" placeholder="Acme Corp" />
            </div>

            <div class="form-group">
              <label for="email">Email <span class="required">*</span></label>
              <input type="email" id="email" placeholder="jane@acmecorp.com" required />
              <span class="field-error" id="err-email"></span>
            </div>

            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" placeholder="+1 (555) 000-0000" />
            </div>

            <div class="form-group">
              <label for="service">Service Needed <span class="required">*</span></label>
              <select id="service" required>
                <option value="">Select a service…</option>
                <option value="Web Design">Web Design</option>
                <option value="Lead Generation">Lead Generation</option>
                <option value="CRM Setup">CRM Setup</option>
                <option value="Automation">Automation</option>
                <option value="Other">Other</option>
              </select>
              <span class="field-error" id="err-service"></span>
            </div>

            <div class="form-group">
              <label for="budget">Budget Range <span class="required">*</span></label>
              <select id="budget" required>
                <option value="">Select a range…</option>
                <option value="Under $500">&lt; $500</option>
                <option value="$500 – $1,000">$500 – $1,000</option>
                <option value="$1,000 – $2,500">$1,000 – $2,500</option>
                <option value="$2,500+">$2,500+</option>
              </select>
              <span class="field-error" id="err-budget"></span>
            </div>

            <div class="form-group">
              <label for="contactMethod">Preferred Contact Method</label>
              <select id="contactMethod">
                <option value="Email">Email</option>
                <option value="Phone">Phone</option>
                <option value="WhatsApp">WhatsApp</option>
              </select>
            </div>
          </div>

          <div class="form-group full-width">
            <label for="summary">Project Summary <span class="required">*</span></label>
            <textarea id="summary" rows="4" placeholder="Describe the project, goals, or any specific requirements…" required></textarea>
            <span class="field-error" id="err-summary"></span>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-ghost" id="clearFormBtn">Clear</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Inquiry
            </button>
          </div>

        </form>
      </div>
    </section>

    <!-- INQUIRIES LIST -->
    <section class="panel list-panel">
      <div class="panel-header">
        <h2>Client Inquiries <span class="badge" id="inquiryCount">0</span></h2>
      </div>

      <!-- TOOLBAR: search + filter -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search by name or company…" />
        </div>

        <div class="filter-pills" id="filterPills">
          <button class="pill active" data-filter="All">All</button>
          <button class="pill" data-filter="New">New</button>
          <button class="pill" data-filter="Contacted">Contacted</button>
          <button class="pill" data-filter="Qualified">Qualified</button>
          <button class="pill" data-filter="Closed">Closed</button>
        </div>
      </div>

      <!-- CARDS CONTAINER -->
      <div id="inquiriesList" class="inquiries-list">
        <!-- cards injected here by JS -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">📋</div>
          <p>No inquiries yet. Submit your first client inquiry above.</p>
        </div>
      </div>
    </section>

  </main>

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
